<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHS Personnel Record System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        /* 코어 레이아웃 */
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 20px;
            background-color: #050505;
            display: flex;
            justify-content: center;
            font-family: 'Noto Serif KR', serif;
        }

        :root {
            --gold-gradient: linear-gradient(135deg, #bf953f 0%, #fcf6ba 45%, #b38728 65%, #fbf5b7 100%);
            --deep-red: #8b0000;
            --border-grey: #2a2a2a;
        }

        /* 폼과 미리보기를 감싸는 전체 레이아웃 (모바일 대응) */
        .generator-layout {
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 30px;
            width: 100%;
            max-width: 1300px;
        }

        /* 모바일 화면(스마트폰)일 때 세로로 배치 */
        @media (max-width: 900px) {
            .generator-layout {
                grid-template-columns: 1fr;
            }
            body { padding: 10px; }
        }

        /* 입력 폼 섹션 */
        .editor-box {
            background: rgba(20, 20, 20, 0.9);
            border-left: 4px solid var(--deep-red);
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            height: fit-content;
        }

        .editor-box h3 {
            color: #fff; margin-top: 0; margin-bottom: 20px; 
            font-weight: 900; border-bottom: 1px solid var(--deep-red); 
            padding-bottom: 10px; letter-spacing: 3px;
        }

        .input-group { margin-bottom: 15px; }
        .input-group label {
            display: block; color: #d4af37; font-size: 13px; margin-bottom: 6px; font-weight: bold;
        }
        .input-group input[type="text"], .input-group textarea, .input-group select {
            width: 100%; background: #111; border: 1px solid var(--border-grey);
            color: #fff; padding: 10px; font-family: inherit; outline: none;
            font-size: 14px; border-radius: 4px;
        }
        .input-group input:focus, .input-group textarea:focus { border-color: var(--deep-red); }
        .input-group input[type="file"] { 
            width: 100%; padding: 8px; background: #111; color: #ccc; border: 1px dashed #555; border-radius: 4px; 
        }

        /* [수정 완] 커스텀 라디오 버튼 스타일링 */
        .radio-box-group { display: flex; gap: 10px; flex-wrap: wrap; }
        
        /* 기본 동그라미 숨기기 (이게 원인이었습니다!) */
        .radio-box-group input[type="radio"] { display: none; }
        
        .radio-box {
            background: #111; border: 1px solid var(--border-grey); color: #ccc;
            padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 13px;
            transition: 0.2s; flex: 1; text-align: center;
        }
        .radio-box:hover { border-color: #555; }
        
        /* 선택되었을 때의 디자인 */
        .radio-box-group input[type="radio"]:checked + .radio-box {
            background: var(--deep-red); border-color: var(--deep-red);
            color: white; font-weight: bold;
        }

        .btn-download {
            margin-top: 20px; width: 100%; padding: 15px; background: var(--deep-red);
            color: white; border: none; border-radius: 4px; cursor: pointer;
            font-family: 'Noto Serif KR', serif; font-weight: bold; letter-spacing: 2px;
            transition: background 0.3s; font-size: 16px;
        }
        .btn-download:hover { background: #600000; }

        /* 결과물 미리보기 영역 */
        .card-preview-container {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            background: #000;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto; /* 폰에서 좌우로 스크롤 가능하게 */
        }

        /* 기록지 디자인 (4:3 비율 프레임 고정) */
        #personnel-card {
            width: 800px;
            min-width: 800px; /* 모바일에서도 찌그러지지 않게 강제 고정 */
            height: 600px; 
            background: #0a0a0a;
            border: 1px solid #1a1a1a;
            position: relative;
            padding: 40px 30px;
            box-sizing: border-box;
            box-shadow: 0 0 30px rgba(0,0,0,1);
            background: linear-gradient(135deg, #0d0d0d 0%, #151515 100%);
        }

        #personnel-card::before {
            content: ''; position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px;
            border: 1px solid rgba(212, 175, 55, 0.1); pointer-events: none;
        }
        #personnel-card::after {
            content: ''; position: absolute; top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 1px solid rgba(139,0,0,0.3); pointer-events: none;
        }

        .card-header { text-align: center; margin-bottom: 30px; position: relative; z-index: 10; }
        .card-header h2 {
            margin: 0; font-size: 32px; font-weight: 900;
            background: var(--gold-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            letter-spacing: 10px; display: inline-block; border-bottom: 2px solid var(--deep-red); padding-bottom: 10px;
        }

        .card-body {
            display: flex; gap: 25px; height: calc(100% - 100px); position: relative; z-index: 10;
        }

        /* 왼쪽: 사진 및 짤막한 정보 */
        .left-info { flex: 0 0 220px; display: flex; flex-direction: column; gap: 15px; }

        .photo-frame {
            width: 200px; height: 200px; margin: 0 auto; border: 2px solid #2a2a2a;
            background: #050505; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.6);
            display: flex; justify-content: center; align-items: center; overflow: hidden;
        }
        .photo-frame::before, .photo-frame::after {
            content: ''; position: absolute; width: 15px; height: 15px; border: 2px solid var(--deep-red); z-index: 5;
        }
        .photo-frame::before { top: -4px; left: -4px; border-right: none; border-bottom: none; }
        .photo-frame::after { bottom: -4px; right: -4px; border-left: none; border-top: none; }

        .photo-frame img {
            width: 100%; height: 100%; object-fit: cover; object-position: center; display: none;
        }
