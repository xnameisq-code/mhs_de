<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멸혼사 인사기록지 생성기</title>
    <!-- 명조체 폰트 불러오기 (고급스럽고 진중한 느낌) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: #0f0f0f;
            --gold: #d4af37;
            --gold-light: #f3e5ab;
            --gray: #c0c0c0;
            --dark-gray: #2a2a2a;
            --red-point: #8b0000; /* 더 깊고 고급스러운 피색 */
            --red-light: #c21807;
        }

        body {
            font-family: 'Noto Serif KR', serif;
            background-color: var(--bg-color);
            color: #fff;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 50px;
            justify-content: center;
            align-items: flex-start;
        }

        /* 왼쪽: 입력 폼 디자인 (세련된 다크 모드 UI) */
        .editor-section {
            background-color: #111;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #333;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .editor-section h2 { 
            margin-top: 0; 
            color: var(--gold); 
            font-weight: 900; 
            border-bottom: 1px solid #333; 
            padding-bottom: 15px; 
            margin-bottom: 30px;
        }
        
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 700; color: var(--gray); font-size: 14px; letter-spacing: 1px; }
        .form-group input[type="text"], .form-group textarea {
            width: 100%; padding: 12px 15px; box-sizing: border-box;
            background-color: #0a0a0a; border: 1px solid #444; color: #fff;
            font-family: inherit; font-size: 14px; border-radius: 4px;
            transition: all 0.3s ease;
        }
        .form-group input[type="text"]:focus, .form-group textarea:focus {
            outline: none; border-color: var(--red-light); box-shadow: 0 0 8px rgba(194, 24, 7, 0.3);
        }
        
        .form-group input[type="file"] { 
            width: 100%; padding: 10px; background: #0a0a0a; border: 1px dashed #555; 
            color: var(--gray); border-radius: 4px; cursor: pointer;
        }
        
        .form-group .hint { font-size: 12px; color: #777; margin-top: 8px; display: block; line-height: 1.4; }
        .radio-group { display: flex; gap: 20px; }
        .radio-group label { color: #ccc; font-weight: 400; display: flex; align-items: center; gap: 8px; cursor: pointer; }

        button.download-btn {
            width: 100%; padding: 16px; background: linear-gradient(135deg, var(--red-point), #5a0000);
            color: var(--gold-light); border: 1px solid #3a0000; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: 0.3s; font-family: inherit; border-radius: 6px; letter-spacing: 2px;
            margin-top: 10px;
        }
        button.download-btn:hover { background: linear-gradient(135deg, var(--red-light), var(--red-point)); color: #fff; box-shadow: 0 5px 15px rgba(139, 0, 0, 0.5); }

        /* 오른쪽: 인사기록지 결과물 (3:4 비율 고정) */
        .preview-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 3:4 비율 고정 (600x800) - 프리미엄 명함 느낌 */
        #id-card {
            width: 600px;
            height: 800px;
            background-color: var(--card-bg);
            border: 1px solid #222;
            box-sizing: border-box;
            padding: 50px 45px;
            position: relative;
            background: linear-gradient(180deg, #121212 0%, #080808 100%);
            box-shadow: 20px 20px 60px rgba(0,0,0,0.9), inset 0 0 80px rgba(0,0,0,0.5);
        }

        /* 얇고 고급스러운 이중 테두리 */
        #id-card::before {
            content: ''; position: absolute; top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 1px solid #333; pointer-events: none;
        }
        #id-card::after {
            content: ''; position: absolute; top: 20px; left: 20px; right: 20px; bottom: 20px;
            border: 1px solid rgba(139, 0, 0, 0.3); pointer-events: none;
        }

        .card-header {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 40px;
            position: relative;
        }

        .card-title {
            color: var(--gold);
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 12px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            position: relative;
            z-index: 2;
            padding: 0 20px;
            background: #121212; /* 선 위로 글자가 올라오게 */
        }

        /* 제목 좌우로 뻗는 우아한 선 */
        .card-header::before {
            content: ''; position: absolute; left: 0; right: 0; top: 50%;
            height: 1px; background: linear-gradient(90deg, transparent, var(--red-point), transparent);
            z-index: 1;
        }

        /* 사진 영역 (비율 유지, 찌그러짐 방지, 프레임 디자인) */
        .photo-area {
            width: 180px;
            height: 240px;
            margin: 0 auto 40px;
            border: 2px solid #333;
            background-color: #050505;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.6);
        }
        /* 사진 모서리 포인트 */
        .photo-area::before, .photo-area::after {
            content: ''; position: absolute; width: 10px; height: 10px; border: 2px solid var(--red-point); pointer-events: none; z-index: 10;
        }
        .photo-area::before { top: -6px; left: -6px; border-right: none; border-bottom: none; }
        .photo-area::after { bottom: -6px; right: -6px; border-left: none; border-top: none; }

        .photo-area img {
            width: 100%; height: 100%; object-fit: cover; display: none;
        }

        /* 정보 영역 - Grid 레이아웃으로 밀림/겹침 완벽 방지 */
        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 18px;
            padding: 0 10px;
            position: relative;
            z-index: 5;
        }

        .info-row {
            display: grid;
            grid-template-columns: 140px 1fr; /* 라벨 너비 고정, 나머지는 값이 차지 */
            align-items: flex-start; /* 글이 길어지면 위쪽 맞춤 */
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 12px;
        }

        .info-label {
            color: var(--red-point);
            font-weight: 700;
            letter-spacing: 4px;
            font-size: 15px;
            padding-top: 2px;
        }

        .info-value {
            color: var(--gray);
            font-weight: 300;
            font-size: 16px;
            line-height: 1.6;
            word-break: keep-all; /* 단어 단위로 줄바꿈 (한국어 밀림 방지) */
            overflow-wrap: break-word; /* 긴 텍스트 강제 줄바꿈 */
            white-space: pre-wrap; /* 사용자가 엔터 친 것도 반영 */
        }

        /* 하단 경고문 */
        .footer-warning {
            position: absolute;
            bottom: 40px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(139, 0, 0, 0.7);
            font-size: 12px;
            letter-spacing: 3px;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <!-- 입력 폼 -->
    <div class="editor-section">
        <h2>기록 열람 · 작성</h2>
        
        <div class="form-group">
            <label>사진 첨부</label>
            <input type="file" id="input-photo" accept="image/*">
        </div>

        <div class="form-group">
            <label>이름</label>
            <input type="text" id="input-name" placeholder="이름을 입력하세요">
        </div>

        <div class="form-group">
            <label>나이</label>
            <input type="text" id="input-age" placeholder="예: 25세 / 향년 21세">
            <span class="hint">※ 특대과의 경우: 현재 나이 작성<br>※ 비문 소속의 경우: 향년 나이 작성</span>
        </div>

        <div class="form-group">
            <label>소속</label>
            <div class="radio-group">
                <label><input type="radio" name="affiliation" value="특대과" onchange="updateRadio('val-affiliation', this.value)" checked> 특대과</label>
                <label><input type="radio" name="affiliation" value="비문" onchange="updateRadio('val-affiliation', this.value)"> 비문</label>
            </div>
        </div>

        <div class="form-group">
            <label>사용 무기</label>
            <input type="text" id="input-weapon" placeholder="사용 무기를 명시하세요">
        </div>

        <div class="form-group">
            <label>성별</label>
            <div class="radio-group">
                <label><input type="radio" name="gender" value="남성" onchange="updateRadio('val-gender', this.value)" checked> 남성</label>
                <label><input type="radio" name="gender" value="여성" onchange="updateRadio('val-gender', this.value)"> 여성</label>
                <label><input type="radio" name="gender" value="무성" onchange="updateRadio('val-gender', this.value)"> 무성</label>
            </div>
        </div>

        <div class="form-group">
            <label>본체 나이</label>
            <div class="radio-group">
                <label><input type="radio" name="true-age" value="성인" onchange="updateRadio('val-true-age', this.value)" checked> 성인</label>
                <label><input type="radio" name="true-age" value="미성년자" onchange="updateRadio('val-true-age', this.value)"> 미성년자</label>
            </div>
        </div>

        <div class="form-group">
            <label>특이 체질 및 이능력</label>
            <textarea id="input-ability" rows="4" placeholder="특징 및 능력을 상세히 서술하세요"></textarea>
        </div>

        <button class="download-btn" onclick="downloadCard()">기록지 다운로드 (PNG)</button>
    </div>

    <!-- 결과물 미리보기 -->
    <div class="preview-section">
        <div id="id-card">
            
            <div class="card-header">
                <div class="card-title">멸혼사 인사기록지</div>
            </div>
            
            <div class="photo-area">
                <img id="card-photo" src="" alt="Profile Photo">
            </div>

            <!-- 밀림 방지 Grid 적용 영역 -->
            <div class="info-grid">
                <div class="info-row">
                    <div class="info-label">이름</div>
                    <div class="info-value" id="val-name">미상</div>
                </div>
                <div class="info-row">
                    <div class="info-label">나이</div>
                    <div class="info-value" id="val-age">미상</div>
                </div>
                <div class="info-row">
                    <div class="info-label">소속</div>
                    <div class="info-value" id="val-affiliation">특대과</div>
                </div>
                <div class="info-row">
                    <div class="info-label">사용 무기</div>
                    <div class="info-value" id="val-weapon">미상</div>
                </div>
                <div class="info-row">
                    <div class="info-label">성별</div>
                    <div class="info-value" id="val-gender">남성</div>
                </div>
                <div class="info-row">
                    <div class="info-label">본체 나이</div>
                    <div class="info-value" id="val-true-age">성인</div>
                </div>
                <div class="info-row">
                    <div class="info-label">특이 체질<br>및 이능력</div>
                    <div class="info-value" id="val-ability">기록 없음</div>
                </div>
            </div>

            <div class="footer-warning">
                본 인사기록지는 보안 문서로 무단 열람 및 유출을 금지합니다.
            </div>
        </div>
    </div>

    <script>
        function syncText(inputId, targetId, defaultText) {
            document.getElementById(inputId).addEventListener('input', function(e) {
                document.getElementById(targetId).innerText = e.target.value || defaultText;
            });
        }

        syncText('input-name', 'val-name', '미상');
        syncText('input-age', 'val-age', '미상');
        syncText('input-weapon', 'val-weapon', '미상');
        syncText('input-ability', 'val-ability', '기록 없음');

        function updateRadio(targetId, value) {
            document.getElementById(targetId).innerText = value;
        }

        document.getElementById('input-photo').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = document.getElementById('card-photo');
                    img.src = event.target.result;
                    img.style.display = 'block';
                }
                reader.readAsDataURL(file);
            }
        });

        function downloadCard() {
            const card = document.getElementById('id-card');
            
            html2canvas(card, { 
                scale: 2, 
                backgroundColor: '#0a0a0a', // 캡처 시 여백 방지
                logging: false
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = '멸혼사_인사기록지.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>
</body>
</html>
